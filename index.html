<!DOCTYPE html>
<html lang="ro">

<head>
  <title>
    Planificator
  </title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    Planificator Activitati
  </header>
  <main>
    <div>
    </div>
    <div class="non-hidden">
      <form id="form">
        <label for="date">Introduceti data:</label>
        <input type="date" min="2026-07-02" id="date">
        <label for="name">Denumire</label>
        <input type="text" id="name" required>
        <label for="desc">Descriere</label>
        <input type="text" id="desc">
        <label for="start">Start</label>
        <input type="time" id="start" required>
        <label for="end">Sfarsit</label>
        <input type="time" id="end" required>
        <button type="submit" id="aplica">
          Aplica
        </button>
      </form>
    </div>
    <div>
      <div id="timetable" class="timetable">
      </div>
      <label for="filter">Azi</label>
      <input type="checkbox" id="filter">
    </div>
  </main>
  <script src="script.js">
  </script>
</body>
</html>
